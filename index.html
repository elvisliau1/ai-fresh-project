<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI Fresh Menu</title>
<style>
/* 直接写在这里，确保扫码即看，永不乱码 */
body { background-color: #f7f7f7; margin: 0; padding: 15px; font-family: sans-serif; display: flex; justify-content: center; }
.app { width: 100%; max-width: 400px; background: #fff; border-radius: 40px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative; margin-bottom: 100px; }
.header { padding: 30px 25px 10px; }
.header h1 { font-size: 32px; font-weight: 800; margin: 0; }
.card { padding: 20px; position: relative; }
.food-img { width: 100%; height: 240px; object-fit: cover; border-radius: 30px; }
.price-tag { position: absolute; top: 40px; right: 40px; background: #fff; padding: 8px 15px; border-radius: 15px; font-weight: 800; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
.info { padding: 15px 5px; }
.title { font-size: 26px; font-weight: 800; margin: 0; }
.sub { font-size: 12px; color: #999; font-weight: bold; margin-top: 5px; }
.tags { display: flex; gap: 8px; margin: 15px 0; }
.tag { background: #fff5f0; color: #ff6b00; padding: 5px 12px; border-radius: 10px; font-size: 12px; font-weight: bold; }
.btn { background: linear-gradient(135deg, #ff6b00, #e65100); color: #fff; text-align: center; padding: 18px; border-radius: 20px; font-weight: 800; font-size: 18px; cursor: pointer; border: none; width: 100%; }
.footer { position: fixed; bottom: 20px; width: calc(100% - 40px); max-width: 360px; background: #1a1a1a; border-radius: 25px; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; color: #fff; }
.total { display: flex; align-items: center; gap: 12px; }
.icon { width: 45px; height: 45px; background: #ff6b00; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>
<div class="app">
<div class="header"><h1>菜单</h1></div>
<div class="card">
<div class="price-tag">RM 6.00</div>
<img src="https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=800" class="food-img">
<div class="info">
<p class="title">面粉过</p>
<p class="sub">MAIN COURSE / 特色面食</p>
<div class="tags">
<span class="tag">加蛋 (+1.50)</span>
<span class="tag">不要葱</span>
</div>
<button class="btn" onclick="alert('已加入购物车')">加入购物车</button>
</div>
</div>
</div>
<div class="footer">
<div class="total">
<div class="icon">🛒</div>
<div style="font-size: 20px; font-weight: 800;">RM 6.00</div>
</div>
<div style="background: rgba(255,255,255,0.15); padding: 10px 20px; border-radius: 15px;">结算</div>
</div>
</body>
</html>
