<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI Fresh - 菜单</title>
<style>
* { box-sizing: border-box; -webkit-font-smoothing: antialiased; margin: 0; padding: 0; }
body { background-color: #FDFBF7; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 24px; color: #1A1F2B; }
.app-container { width: 100%; max-width: 420px; padding-bottom: 120px; }
.header { margin: 20px 0 30px 0; }
.header h1 { font-size: 34px; font-weight: 900; color: #0F172A; }
.food-card { background: #FFFFFF; border-radius: 48px; overflow: hidden; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.06); position: relative; margin-bottom: 30px; }
.image-wrapper { width: 100%; height: 280px; }
.food-img { width: 100%; height: 100%; object-fit: cover; }
.price-tag { position: absolute; top: 24px; right: 24px; background: rgba(255, 255, 255, 0.96); padding: 10px 22px; border-radius: 20px; font-weight: 900; font-size: 18px; color: #0F172A; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
.card-content { padding: 35px; }
.food-title { font-size: 30px; font-weight: 900; color: #1E293B; margin-bottom: 4px; }
.food-category { color: #94A3B8; font-size: 13px; font-weight: 800; text-transform: uppercase; margin-bottom: 25px; }
.specs-group { display: flex; gap: 10px; margin-bottom: 35px; flex-wrap: wrap; }
.spec-tag { background-color: #FFF5F0; color: #FF6B00; padding: 8px 16px; border-radius: 14px; font-size: 13px; font-weight: 700; }
.add-to-cart-btn { width: 100%; background: linear-gradient(135deg, #FF6B00 0%, #E65100 100%); color: #FFFFFF; border: none; padding: 20px; border-radius: 26px; font-size: 20px; font-weight: 900; cursor: pointer; box-shadow: 0 12px 24px rgba(255, 107, 0, 0.25); }
.bottom-nav { position: fixed; bottom: 30px; left: 20px; right: 20px; max-width: 400px; margin: 0 auto; background: #1A1F2B; border-radius: 36px; padding: 14px 22px; display: flex; align-items: center; justify-content: space-between; color: #FFFFFF; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4); z-index: 100; }
.cart-preview { display: flex; align-items: center; gap: 16px; }
.cart-icon-container { width: 58px; height: 58px; background: linear-gradient(135deg, #FF6B00 0%, #E65100 100%); border-radius: 22px; display: flex; align-items: center; justify-content: center; position: relative; }
.cart-count { position: absolute; top: -6px; right: -6px; background: #FFFFFF; color: #FF6B00; width: 24px; height: 24px; border-radius: 12px; font-size: 12px; font-weight: 900; display: flex; align-items: center; justify-content: center; border: 3.5px solid #1A1F2B; }
.btn-checkout { background: rgba(255, 255, 255, 0.12); color: #FFFFFF; border: none; padding: 12px 28px; border-radius: 20px; font-weight: 800; font-size: 16px; cursor: pointer; }
</style>
</head>
<body>
<div class="app-container">
<div class="header">
<h1>菜单</h1>
</div>
<div class="food-card">
<div class="price-tag">RM 6.00</div>
<div class="image-wrapper">
<img src="https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=800" class="food-img" alt="面粉过">
</div>
<div class="card-content">
<h2 class="food-title">面粉过</h2>
<p class="food-category">特色面食 / Mains</p>
<div class="specs-group">
<span class="spec-tag">加蛋 (+1.50)</span>
<span class="spec-tag">不要葱</span>
<span class="spec-tag">手工制作</span>
</div>
<button class="add-to-cart-btn" onclick="alert('✅ 已成功加入购物车')">
+ 加入购物车
</button>
</div>
</div>
</div>
<div class="bottom-nav">
<div class="cart-preview">
<div class="cart-icon-container">
<span class="cart-count">1</span>
<span style="font-size:24px">🛍️</span>
</div>
<div>
<h4 style="font-size:10px; color:#64748B; font-weight:900; text-transform:uppercase; margin-bottom:2px;">Subtotal</h4>
<p style="font-size:24px; font-weight:900; font-style:italic;">RM 6.00</p>
</div>
</div>
<button class="btn-checkout">结算</button>
</div>
</body>
</html>
